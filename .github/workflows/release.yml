name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.4
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test -v ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

  goreleaser:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Release config
        run: |
          cat << EOF > /tmp/goreleaser-github.yaml
          project_name: modelhub
          version: 2
          builds:
          - env: [CGO_ENABLED=0]
            main: ./cmd/modelhub
            goos:
            - linux
            - darwin
            goarch:
            - amd64
            - arm64
          nfpms:
          -
            maintainer: Jelloeater <jello@jelloeater.me>
            bindir: /usr/local/bin
            description: TUI for browsing LLM pricing, capabilities, and benchmarks
            homepage: https://github.com/Jelloeater/modelhub
            license: MIT
            formats:
            - deb
            - rpm
            - apk
            - termux.deb
            - archlinux
            - ipk

          release:
            draft: false
            replace_existing_draft: true
            replace_existing_artifacts: true
            target_commitish: "{{ .Commit }}"
            prerelease: auto

          make_latest: true
          mode: replace
          include_meta: true
          EOF

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose --config /tmp/goreleaser-github.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List Dist
        run: |
          tree dist
