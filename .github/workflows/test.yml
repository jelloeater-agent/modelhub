name: Test

on:
  pull_request:
  push:

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.4
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test -v ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

      - name: check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: cover.out
          local-prefix: github.com/jelloeater/modelhub
          threshold-file: 0
          threshold-package: 0
          threshold-total: 10
          git-token: ${{ github.ref_name == 'main' && secrets.GITHUB_TOKEN || '' }}
          git-branch: badges

  goreleaser:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Deps
        run: |
          sudo apt-get install tree git-extras -y

      - name: Release config
        run: |
          cat << EOF > /tmp/goreleaser-github.yaml
          project_name: modelhub
          version: 2
          builds:
          - env: [CGO_ENABLED=0]
            main: ./cmd/modelhub
            goos:
            - linux
            - darwin
            goarch:
            - amd64
            - arm64
            - "386"
            - arm
            goarm:
            - "6"
            - "7"
            ignore:
            - goos: darwin
              goarch: "386"
            - goos: darwin
              goarch: arm
          nfpms:
          -
            maintainer: Jelloeater <jello@jelloeater.me>
            bindir: /usr/local/bin
            description: TUI for browsing LLM pricing, capabilities, and benchmarks
            homepage: https://github.com/Jelloeater/modelhub
            license: MIT
            formats:
            - deb
            - rpm
            - apk
            - termux.deb
            - archlinux
            - ipk
          EOF

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose --snapshot --config /tmp/goreleaser-github.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List & Clean Dist
        run: |
          tree dist
          cd dist
          find . -type d -name "*modelhub*" -exec rm -rf {} +
          cd ..
          tree dist

      - name: Add changelog
        run: |
          git-changelog -a -x -t >> dist/CHANGELOG.md || true

      - name: Generate artifact name
        id: artifact_name
        run: |
          REPO_NAME=\${GITHUB_REPOSITORY##*/}
          SHORT_SHA=\${GITHUB_SHA::7}
          ARTIFACT_NAME="\${REPO_NAME}-\${GITHUB_REF_NAME}-\${SHORT_SHA}"
          echo "name=\$ARTIFACT_NAME" >> \$GITHUB_OUTPUT

      - name: Upload Dist
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: dist/*
          retention-days: 14
